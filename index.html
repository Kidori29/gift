<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💝</title>
    <link rel="icon" href="https://fav.farm/💝">

    <link rel="stylesheet" href="css/style.css">
    <!-- Custom Icons & Styles -->
    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/form.css">
    <!-- Google Fonts Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&display=swap"
        as="style">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Background particles -->
    <div class="particles" id="particles"></div>

    <!-- Floating hearts -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Main container -->
    <div class="container" id="container">
        <!-- Initial screen with gift box -->
        <div class="gift-screen" id="giftScreen">
            <h1 class="welcome-text">
                <i class="fas fa-gift"></i> Hộp quà <i class="fas fa-gift"></i>
            </h1>
            <div class="gift-box" id="giftBox">
                <div class="gift-lid">
                    <div class="ribbon-horizontal"></div>
                    <div class="ribbon-vertical"></div>
                    <div class="bow">
                        <div class="bow-left"></div>
                        <div class="bow-right"></div>
                        <div class="bow-center"></div>
                    </div>
                </div>
                <div class="gift-body">
                    <div class="ribbon-body"></div>
                </div>
                <div class="gift-shadow"></div>
            </div>
            <p class="hint-text">
                <i class="fas fa-sparkles"></i> Nhấn vào để mở! <i class="fas fa-sparkles"></i>
            </p>
        </div>
    </div>

    <!-- Confetti container -->
    <canvas id="confettiCanvas"></canvas>


    <script src="js/icons.js"></script>
    <script src="js/script.js"></script>
    <script src="js/config.js"></script>
    <script src="js/form.js"></script>
</body>

</html>
